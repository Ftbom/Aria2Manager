name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Extract tag name
      run: echo "TAG_NAME=$($env:GITHUB_REF -replace '^refs/tags/v', '')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Restore dependencies
      run: dotnet restore Aria2Manager.sln

    - name: Publish x64 project with version
      run: |
        $version = "${{ env.TAG_NAME }}"
        dotnet publish Aria2Manager.WPF/Aria2Manager.WPF.csproj --configuration Release --output ./publish-x64 /p:Version=$version --self-contained true -r win-x64
      shell: pwsh
    
    - name: Publish x86 project with version
      run: |
        $version = "${{ env.TAG_NAME }}"
        dotnet publish Aria2Manager.WPF/Aria2Manager.WPF.csproj --configuration Release --output ./publish-x86 /p:Version=$version --self-contained true -r win-x86
      shell: pwsh

    - name: Download latest aria2 and place in publish dir
      run: |
        $releaseData = Invoke-RestMethod -Uri "https://api.github.com/repos/aria2/aria2/releases/latest"
        $asset64 = $releaseData.assets | Where-Object { $_.name -match "win-64bit.*\.zip$" } | Select-Object -First 1
        Write-Host "Downloading x64 aria2 from: $($asset64.browser_download_url)"
        Invoke-WebRequest -Uri $asset64.browser_download_url -OutFile "aria2_x64_download.zip"
        Expand-Archive -Path "aria2_x64_download.zip" -DestinationPath "aria2_x64_extract" -Force
        $exe64 = Get-ChildItem -Path "aria2_x64_extract" -Filter "aria2c.exe" -Recurse | Select-Object -First 1
        if ($exe64) {
            New-Item -ItemType Directory -Force -Path "./publish-x64/Aria2"
            Move-Item -Path $exe64.FullName -Destination "./publish-x64/Aria2/aria2c.exe" -Force
            Write-Host "Successfully extracted and moved to ./publish-x64/Aria2/aria2c.exe"
        } else {
            Write-Error "Could not find win64 aria2c.exe in the downloaded archive."
            exit 1
        }
        Remove-Item -Path "aria2_x64_download.zip" -Force
        Remove-Item -Path "aria2_x64_extract" -Recurse -Force

        $asset86 = $releaseData.assets | Where-Object { $_.name -match "win-32bit.*\.zip$" } | Select-Object -First 1
        Write-Host "Downloading x86 aria2 from: $($asset86.browser_download_url)"
        Invoke-WebRequest -Uri $asset86.browser_download_url -OutFile "aria2_x86_download.zip"
        Expand-Archive -Path "aria2_x86_download.zip" -DestinationPath "aria2_x86_extract" -Force
        $exe86 = Get-ChildItem -Path "aria2_x86_extract" -Filter "aria2c.exe" -Recurse | Select-Object -First 1
        if ($exe86) {
            New-Item -ItemType Directory -Force -Path "./publish-x86/Aria2"
            Move-Item -Path $exe86.FullName -Destination "./publish-x86/Aria2/aria2c.exe" -Force
            Write-Host "Successfully extracted and moved to ./publish-x86/Aria2/aria2c.exe"
        } else {
            Write-Error "Could not find win32 aria2c.exe in the downloaded archive."
            exit 1
        }
        Remove-Item -Path "aria2_x86_download.zip" -Force
        Remove-Item -Path "aria2_x86_extract" -Recurse -Force
      shell: pwsh

    - name: Zip published files with tag name
      run: |
        powershell Compress-Archive -Path ./publish-x64/* -DestinationPath ./Aria2Manager.${{ env.TAG_NAME }}.Portable.x64.zip
        powershell Compress-Archive -Path ./publish-x86/* -DestinationPath ./Aria2Manager.${{ env.TAG_NAME }}.Portable.x86.zip

    - name: Create GitHub Release and upload artifact
      uses: softprops/action-gh-release@v3
      with:
        files: |
          Aria2Manager.${{ env.TAG_NAME }}.Portable.x64.zip
          Aria2Manager.${{ env.TAG_NAME }}.Portable.x86.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
