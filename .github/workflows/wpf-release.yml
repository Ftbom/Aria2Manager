name: WPF Build and Release

on:
  push:
    tags:
      - 'wpf-v*'
  workflow_dispatch:
    inputs:
      manual_tag:
        description: '输入Tag (例如: wpf-v1.0.0 或直接输入 1.0.0)'
        required: true
        default: 'wpf-v1.0.0'

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Extract tag name
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.manual_tag }}" -replace '^wpf-v', ''
        } else {
            $tag = "$env:GITHUB_REF" -replace '^refs/tags/wpf-v', ''
        }
        echo "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: pwsh

    - name: Publish win-x64
      run: |
        dotnet publish Aria2Manager.WPF/Aria2Manager.WPF.csproj --configuration Release --output ./publish/win-x64 /p:Version=${{ env.TAG_NAME }} /p:DebugType=none /p:DebugSymbols=false --self-contained true -r win-x64
        Get-ChildItem -Path "./publish/win-x64" -Filter "*.pdb" -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path "./publish/win-x64-bundle"
        Copy-Item -Path "./publish/win-x64/*" -Destination "./publish/win-x64-bundle" -Recurse
      shell: pwsh

    - name: Publish win-arm64
      run: |
        dotnet publish Aria2Manager.WPF/Aria2Manager.WPF.csproj --configuration Release --output ./publish/win-arm64 /p:Version=${{ env.TAG_NAME }} /p:DebugType=none /p:DebugSymbols=false --self-contained true -r win-arm64
        Get-ChildItem -Path "./publish/win-arm64" -Filter "*.pdb" -Recurse | Remove-Item -Force -ErrorAction SilentlyContinue
      shell: pwsh

    - name: Download and inject aria2 to bundle
      run: |
        $headers = @{
            Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
        }
        $releaseData = Invoke-RestMethod -Uri "https://api.github.com/repos/aria2/aria2/releases/latest" -Headers $headers
        $asset = $releaseData.assets | Where-Object { $_.name -match "win-64bit.*\.zip$" } | Select-Object -First 1
        Write-Host "Downloading x64 aria2 from: $($asset.browser_download_url)"
        Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "aria2_x64_download.zip"
        Expand-Archive -Path "aria2_x64_download.zip" -DestinationPath "aria2_x64_extract" -Force
        $exe = Get-ChildItem -Path "aria2_x64_extract" -Filter "aria2c.exe" -Recurse | Select-Object -First 1
        if ($exe) {
            New-Item -ItemType Directory -Force -Path "./publish/win-x64-bundle/Aria2"
            Move-Item -Path $exe.FullName -Destination "./publish/win-x64-bundle/Aria2/aria2c.exe" -Force
            Write-Host "Successfully extracted and moved to ./publish/win-x64-bundle/Aria2/aria2c.exe"
        } else {
            Write-Error "Could not find win64 aria2c.exe in the downloaded archive."
            exit 1
        }
        Remove-Item -Path "aria2_x64_download.zip" -Force
        Remove-Item -Path "aria2_x64_extract" -Recurse -Force
      shell: pwsh

    - name: Zip published files with tag name
      run: |
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./Aria2Manager.WPF.${{ env.TAG_NAME }}.win-x64.zip
        Compress-Archive -Path ./publish/win-x64-bundle/* -DestinationPath ./Aria2Manager.WPF.${{ env.TAG_NAME }}.win-x64-bundle.zip
        Compress-Archive -Path ./publish/win-arm64/* -DestinationPath ./Aria2Manager.WPF.${{ env.TAG_NAME }}.win-arm64.zip
      shell: pwsh

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows-assets
        path: |
          Aria2Manager.WPF.${{ env.TAG_NAME }}.win-x64.zip
          Aria2Manager.WPF.${{ env.TAG_NAME }}.win-x64-bundle.zip
          Aria2Manager.WPF.${{ env.TAG_NAME }}.win-arm64.zip
        retention-days: 1

  create_release:
    needs: [build_and_release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all assets
      uses: actions/download-artifact@v8
      with:
        path: ./release-assets
        merge-multiple: true

    - name: Display downloaded files
      run: ls -R ./release-assets

    - name: Create GitHub Release and upload all artifacts
      uses: softprops/action-gh-release@v3
      with:
        files: ./release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
